<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHIL 1304 Course Guide Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg:#FAF6EE;
      --bg2:#FCFAF5;
      --ink:#2D2419;
      --muted:#6F604B;
      --border:#E6DCC3;
      --accent:#8B6D43;
      --accent2:#614A2A;
      --panel:#FFFFFF;
      --panel-soft:#F8F3E8;
    }

    html { scroll-behavior: smooth; }
    body{
      margin:0;
      font-family:'Lora', serif;
      color:var(--ink);
      background:
        linear-gradient(135deg, rgba(250,246,238,.97), rgba(252,250,245,.97)),
        url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d0c39f' fill-opacity='0.18'%3E%3Cpath d='M40 0l3 10 7-7-3 10 10-3-7 7 10 3h-10l7 7-10-3 3 10-7-7-3 10-3-10-7 7 3-10-10 3 7-7-10-3h10l-7-7 10 3-3-10 7 7zM0 40l3 10 7-7-3 10 10-3-7 7 10 3H10l7 7-10-3 3 10-7-7-3 10-3-10-7 7 3-10-10 3 7-7-10-3h10l-7-7 10 3-3-10 7 7z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      background-attachment: fixed;
    }

    .font-cinzel { font-family:'Cinzel', serif; }
    .card{
      background: linear-gradient(to bottom right, #fff, var(--bg2));
      border:1px solid var(--border);
      box-shadow: 0 20px 40px -15px rgba(45,36,25,.15), 0 15px 20px -15px rgba(45,36,25,.1);
    }
    .hero{
      background:
        linear-gradient(135deg, rgba(250,246,238,.92), rgba(252,250,245,.92)),
        url("https://images.unsplash.com/photo-1507823806703-987a7fca0c43?auto=format&fit=crop&w=1600&q=80") center/cover;
      border-bottom:1px solid var(--border);
    }
    .sidebar-link{
      transition:all .2s ease;
      border:1px solid rgba(255,255,255,.08);
    }
    .sidebar-link:hover{
      transform:translateX(3px);
      background:rgba(139,109,67,.10);
      border-color:rgba(139,109,67,.25);
    }
    .pill{
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
    }
    .soft{
      background:rgba(248,243,232,.7);
      border:1px solid var(--border);
    }
    .nav-anchor{
      scroll-margin-top: 90px;
    }
  </style>
</head>
<body class="min-h-screen">

  <div class="flex min-h-screen">
    <aside class="hidden lg:flex w-72 shrink-0 flex-col sticky top-0 h-screen bg-[#2D2419] text-[#FAF6EE] border-r border-[#E6DCC3]">
      <div class="p-6 border-b border-white/10">
        <div class="text-xs uppercase tracking-[0.35em] text-[#D0C39F] font-semibold">PHIL 1304</div>
        <div class="mt-2 text-2xl font-cinzel font-bold leading-tight">Course Guide Hub</div>
        <p class="mt-3 text-sm text-white/70">
          World religions resources, course support, and the affinity quiz.
        </p>
      </div>

      <nav class="p-4 space-y-2 text-sm">
        <a class="sidebar-link block rounded-lg px-4 py-3 hover:text-white" href="#top">
          <i class="fa-solid fa-house mr-2 text-[#D0C39F]"></i>Overview
        </a>
        <a class="sidebar-link block rounded-lg px-4 py-3 hover:text-white" href="#instructor">
          <i class="fa-solid fa-chalkboard-user mr-2 text-[#D0C39F]"></i>Instructor
        </a>
        <a class="sidebar-link block rounded-lg px-4 py-3 hover:text-white" href="#tools">
          <i class="fa-solid fa-wand-magic-sparkles mr-2 text-[#D0C39F]"></i>Learning Tool
        </a>
        <a class="sidebar-link block rounded-lg px-4 py-3 hover:text-white" href="#modules">
          <i class="fa-solid fa-layer-group mr-2 text-[#D0C39F]"></i>Module
